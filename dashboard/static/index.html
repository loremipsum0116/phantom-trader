<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phantom Trader — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.5.0/umd/Recharts.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-0:#06080d;--bg-1:#0c1017;--bg-2:#111827;--bg-3:#1a2235;
  --border:#1e293b;--border-h:#334155;
  --text-0:#f1f5f9;--text-1:#94a3b8;--text-2:#64748b;
  --green:#22c55e;--green-dim:rgba(34,197,94,.12);
  --red:#ef4444;--red-dim:rgba(239,68,68,.12);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,.12);
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,.12);
  --font-mono:'JetBrains Mono',monospace;
  --font-sans:'Manrope',system-ui,sans-serif;
}
html{font-size:13px}
body{background:var(--bg-0);color:var(--text-0);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg-1)}
::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:3px}
#root{min-height:100vh}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-0)}
.login-box{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:40px;width:360px}
.login-box h1{font-size:1.3rem;font-weight:700;margin-bottom:8px;letter-spacing:-.02em}
.login-box p{color:var(--text-2);font-size:.85rem;margin-bottom:24px}
.login-box input{width:100%;padding:10px 14px;background:var(--bg-1);border:1px solid var(--border);border-radius:6px;color:var(--text-0);font-family:var(--font-mono);font-size:.9rem;outline:none;margin-bottom:16px}
.login-box input:focus{border-color:var(--blue)}
.login-box button{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:.9rem}
.login-box button:hover{opacity:.9}
.login-err{color:var(--red);font-size:.8rem;margin-bottom:12px}

/* Layout */
.shell{display:grid;grid-template-columns:220px 1fr;grid-template-rows:56px 1fr;min-height:100vh}
.topbar{grid-column:1/-1;background:var(--bg-1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;justify-content:space-between}
.topbar-brand{font-weight:800;font-size:1.1rem;letter-spacing:-.03em;color:var(--text-0)}
.topbar-brand span{color:var(--blue);margin-right:2px}
.topbar-right{display:flex;align-items:center;gap:16px;color:var(--text-2);font-size:.8rem;font-family:var(--font-mono)}
.topbar-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px}

.sidebar{background:var(--bg-1);border-right:1px solid var(--border);padding:16px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--text-2);font-size:.88rem;font-weight:500;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--text-0);background:var(--bg-2)}
.nav-item.active{color:var(--text-0);border-left-color:var(--blue);background:var(--bg-2)}
.nav-icon{width:16px;height:16px;opacity:.7}
.nav-label{font-size:.75rem;color:var(--text-2);padding:24px 20px 8px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}

.main{padding:20px 24px;overflow-y:auto;max-height:calc(100vh - 56px);background:var(--bg-0)}

/* Cards */
.card{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:16px 20px}
.card-title{font-size:.75rem;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:12px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:14px 18px}
.kpi-label{font-size:.7rem;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:6px}
.kpi-value{font-family:var(--font-mono);font-size:1.35rem;font-weight:700}
.kpi-sub{font-family:var(--font-mono);font-size:.75rem;margin-top:2px}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:.82rem}
.tbl th{text-align:left;padding:8px 12px;color:var(--text-2);font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg-2);z-index:1}
.tbl td{padding:8px 12px;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:.8rem;white-space:nowrap}
.tbl tr:hover td{background:var(--bg-3)}
.tbl .r{text-align:right}

/* Helpers */
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--text-2)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:600;font-family:var(--font-mono)}
.badge-long{background:var(--green-dim);color:var(--green)}
.badge-short{background:var(--red-dim);color:var(--red)}
.badge-liq{background:var(--red-dim);color:var(--red)}
.flex-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.flex-row > *{flex:1;min-width:0}
.chart-wrap{width:100%;height:320px}
.chart-wrap-sm{width:100%;height:240px}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filters select,.filters input{padding:6px 10px;background:var(--bg-1);border:1px solid var(--border);border-radius:5px;color:var(--text-0);font-size:.8rem;font-family:var(--font-sans)}
.filters select:focus,.filters input:focus{border-color:var(--blue);outline:none}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{aspect-ratio:1;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:.68rem;cursor:default;position:relative}
.cal-cell .day{font-size:.62rem;color:var(--text-2);margin-bottom:1px}
.cal-header{font-size:.65rem;color:var(--text-2);text-align:center;padding:4px 0;font-weight:600}

/* Responsive */
@media(max-width:768px){.flex-row{flex-direction:column}.flex-row>.card{min-height:450px}.tradingview-widget-container{min-height:400px}

  .shell{grid-template-columns:1fr;grid-template-rows:56px auto 1fr}
  .sidebar{display:flex;overflow-x:auto;padding:8px;border-right:none;border-bottom:1px solid var(--border)}
  .nav-item{padding:8px 14px;border-left:none;border-bottom:2px solid transparent;white-space:nowrap}
  .nav-item.active{border-left-color:transparent;border-bottom-color:var(--blue)}
  .nav-label{display:none}
  .main{max-height:none}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo} = React;
const {LineChart,Line,AreaChart,Area,BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Cell,PieChart,Pie,Legend,ComposedChart} = Recharts;

// ═══════════════════ API ═══════════════════

const API = {
  token: localStorage.getItem('pt_token') || '',
  
  async _fetch(url) {
    const r = await fetch(url, {headers: {'Authorization': `Bearer ${this.token}`}});
    if (r.status === 401) { this.token = ''; localStorage.removeItem('pt_token'); window.location.reload(); }
    return r.json();
  },
  
  async login(pw) {
    const r = await fetch('/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pw})
    });
    if (!r.ok) throw new Error('Invalid');
    const {token} = await r.json();
    this.token = token;
    localStorage.setItem('pt_token', token);
    return token;
  },
  
  overview: () => API._fetch('/api/overview'),
  positions: () => API._fetch('/api/positions'),
  equity: (sid, days=30) => API._fetch(`/api/equity?days=${days}${sid ? `&strategy_id=${sid}` : ''}`),
  trades: (params='') => API._fetch(`/api/trades?${params}`),
  calendar: (sid, days=90) => API._fetch(`/api/calendar?days=${days}${sid ? `&strategy_id=${sid}` : ''}`),
  strategy: (sid) => API._fetch(`/api/strategy/${sid}`),
  compare: () => API._fetch('/api/compare'),
  risk: () => API._fetch('/api/risk'),
  feed: (n=50) => API._fetch(`/api/feed?limit=${n}`),
};

// ═══════════════════ Helpers ═══════════════════

const $ = (v,d=2) => v == null ? '-' : `$${Number(v).toLocaleString('en',{minimumFractionDigits:d,maximumFractionDigits:d})}`;
const pct = (v,d=2) => v == null ? '-' : `${v >= 0 ? '+' : ''}${Number(v).toFixed(d)}%`;
const cn = v => v > 0 ? 'pos' : v < 0 ? 'neg' : 'neu';
const short = id => {const m = id.match(/^(S\d+)/); return m ? m[1] : id.slice(0,8)};
const SNAMES = {
  S1_trail_4h_5x:'S1 Trail 4H 5x', S2_keltner_1h_3x:'S2 Keltner 1H 3x',
  S3_trail_lb20_4h_1x:'S3 Trail LB20 1x', S4_trail_lb50_4h_1x:'S4 Trail LB50 1x',
  S5_fixed_tp_4h_15x:'S5 Fixed 4H 15x', S6_ma_5_20_4h_1x:'S6 MA5/20 1x',
  S7_trail_lb10_4h_1x:'S7 Trail LB10 1x', S8_multi_coin_4h_1x:'S8 Multi-Coin 1x',
  S9_ma_10_30_4h_1x:'S9 MA10/30 1x', S10_composite_1h_20x:'S10 Composite 20x',
};
const sn = id => SNAMES[id] || id;
const fmtDate = s => s ? s.slice(0,10) : '';
const fmtTime = s => s ? s.slice(11,16) : '';

const COLORS = ['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1'];

// ═══════════════════ Login ═══════════════════

function LoginPage({onLogin}) {
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const submit = async () => {
    try { await API.login(pw); onLogin(); } catch { setErr('Incorrect password'); }
  };
  return (
    <div className="login-wrap">
      <div className="login-box">
        <h1>Phantom Trader</h1>
        <p>Dashboard Authentication</p>
        {err && <div className="login-err">{err}</div>}
        <input type="password" placeholder="Password" value={pw}
          onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} autoFocus />
        <button onClick={submit}>Access Dashboard</button>
      </div>
    </div>
  );
}

// ═══════════════════ Overview Page ═══════════════════

function OverviewPage() {
  const [data, setData] = useState(null);
  const [eqData, setEqData] = useState([]);
  const [posData, setPosData] = useState([]);
  
  useEffect(() => {
    API.overview().then(setData);
    API.equity(null, 30).then(r => setEqData(r.data || []));
    API.positions().then(r => setPosData(r.positions || []));
  }, []);
  
  if (!data) return <div style={{color:'var(--text-2)',padding:40}}>Loading...</div>;
  const s = data.summary;
  
  return (
    <div>
      <div className="kpi-grid">
        <div className="kpi">
          <div className="kpi-label">Total Balance</div>
          <div className="kpi-value">{$(s.total_balance)}</div>
          <div className={`kpi-sub ${cn(s.total_return_pct)}`}>{pct(s.total_return_pct)}</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Net P&L</div>
          <div className={`kpi-value ${cn(s.total_pnl)}`}>{$(s.total_pnl)}</div>
          <div className="kpi-sub" style={{color:'var(--text-2)'}}>Fees: {$(s.total_fees)}</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Win Rate</div>
          <div className="kpi-value">{s.total_win_rate}%</div>
          <div className="kpi-sub" style={{color:'var(--text-2)'}}>{s.total_wins}W / {s.total_losses}L</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Total Trades</div>
          <div className="kpi-value">{s.total_trades}</div>
          <div className="kpi-sub" style={{color:'var(--text-2)'}}>Liquidations: {s.total_liquidations}</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Active Positions</div>
          <div className="kpi-value">{posData.length}</div>
          <div className="kpi-sub" style={{color:'var(--text-2)'}}>{data.strategies.filter(x=>x.is_active).length} strategies</div>
        </div>
      </div>
      
      {/* Equity Curve */}
      <div className="card" style={{marginBottom:20}}>
        <div className="card-title">Portfolio Equity — 30D</div>
        <div className="chart-wrap">
          <ResponsiveContainer>
            <AreaChart data={eqData}>
              <defs>
                <linearGradient id="eqG" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor="#3b82f6" stopOpacity={0.3}/>
                  <stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/>
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
              <XAxis dataKey="timestamp" tickFormatter={s=>s?s.slice(5,10):''} stroke="#475569" tick={{fontSize:10,fontFamily:'JetBrains Mono'}} />
              <YAxis stroke="#475569" tick={{fontSize:10,fontFamily:'JetBrains Mono'}} tickFormatter={v=>`$${(v/1000).toFixed(0)}k`} />
              <Tooltip contentStyle={{background:'#1a2235',border:'1px solid #334155',borderRadius:6,fontFamily:'JetBrains Mono',fontSize:11}} labelFormatter={s=>s?s.slice(0,16):''} formatter={v=>[`$${Number(v).toLocaleString('en',{maximumFractionDigits:0})}`]} />
              <Area type="monotone" dataKey="total_equity" stroke="#3b82f6" fill="url(#eqG)" strokeWidth={1.5} dot={false} />
            </AreaChart>
          </ResponsiveContainer>
        </div>
      </div>
      
      {/* Strategy Table */}
      <div className="card">
        <div className="card-title">Strategy Performance</div>
        <div style={{overflowX:'auto'}}>
          <table className="tbl">
            <thead>
              <tr>
                <th>Strategy</th><th className="r">Balance</th><th className="r">Return</th>
                <th className="r">P&L</th><th className="r">Trades</th><th className="r">Win Rate</th>
                <th className="r">PF</th><th className="r">MDD</th><th className="r">Liq</th>
              </tr>
            </thead>
            <tbody>
              {data.strategies.map((r,i) => (
                <tr key={r.strategy_id}>
                  <td style={{fontFamily:'var(--font-sans)',fontWeight:600}}>{sn(r.strategy_id)}</td>
                  <td className="r">{$(r.balance)}</td>
                  <td className={`r ${cn(r.return_pct)}`}>{pct(r.return_pct)}</td>
                  <td className={`r ${cn(r.total_pnl)}`}>{$(r.total_pnl)}</td>
                  <td className="r">{r.trades}</td>
                  <td className="r">{r.win_rate}%</td>
                  <td className="r">{r.profit_factor != null ? r.profit_factor.toFixed(2) : '—'}</td>
                  <td className="r neg">{r.max_drawdown_pct > 0 ? `-${r.max_drawdown_pct}%` : '0%'}</td>
                  <td className="r">{r.liquidations > 0 ? <span className="neg">{r.liquidations}</span> : '0'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════ Equity Page ═══════════════════

function EquityPage() {
  const [sid, setSid] = useState('');
  const [days, setDays] = useState(30);
  const [data, setData] = useState([]);
  const [strategies, setStrategies] = useState([]);
  
  useEffect(() => { API.overview().then(r => setStrategies(r.strategies)); }, []);
  useEffect(() => { API.equity(sid||null, days).then(r => setData(r.data || [])); }, [sid, days]);
  
  return (
    <div>
      <div className="filters">
        <select value={sid} onChange={e=>setSid(e.target.value)}>
          <option value="">All Strategies (Combined)</option>
          {strategies.map(s=><option key={s.strategy_id} value={s.strategy_id}>{sn(s.strategy_id)}</option>)}
        </select>
        {[7,14,30,60,90].map(d => (
          <button key={d} onClick={()=>setDays(d)} style={{
            padding:'6px 12px',background:days===d?'var(--blue)':'var(--bg-1)',
            border:'1px solid '+(days===d?'var(--blue)':'var(--border)'),
            borderRadius:5,color:'var(--text-0)',cursor:'pointer',fontSize:'.8rem',fontWeight:600
          }}>{d}D</button>
        ))}
      </div>
      
      <div className="card" style={{marginBottom:20}}>
        <div className="card-title">Equity Curve</div>
        <div className="chart-wrap" style={{height:400}}>
          <ResponsiveContainer>
            <ComposedChart data={data}>
              <defs>
                <linearGradient id="eqFill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="5%" stopColor="#3b82f6" stopOpacity={0.25}/>
                  <stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/>
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
              <XAxis dataKey="timestamp" tickFormatter={s=>s?s.slice(5,10):''} stroke="#475569" tick={{fontSize:10,fontFamily:'JetBrains Mono'}} />
              <YAxis yAxisId="eq" stroke="#475569" tick={{fontSize:10,fontFamily:'JetBrains Mono'}} tickFormatter={v=>`$${(v/1000).toFixed(1)}k`} />
              <YAxis yAxisId="dd" orientation="right" stroke="#475569" tick={{fontSize:10,fontFamily:'JetBrains Mono'}} tickFormatter={v=>`${v.toFixed(1)}%`} reversed />
              <Tooltip contentStyle={{background:'#1a2235',border:'1px solid #334155',borderRadius:6,fontFamily:'JetBrains Mono',fontSize:11}} />
              <Area yAxisId="eq" type="monotone" dataKey="total_equity" stroke="#3b82f6" fill="url(#eqFill)" strokeWidth={1.5} dot={false} name="Equity" />
              <Line yAxisId="dd" type="monotone" dataKey="drawdown_pct" stroke="#ef4444" strokeWidth={1} dot={false} name="Drawdown %" strokeDasharray="4 2" />
            </ComposedChart>
          </ResponsiveContainer>
        </div>
      </div>
      
      <div className="flex-row">
        <div className="card">
          <div className="card-title">Balance</div>
          <div className="chart-wrap-sm">
            <ResponsiveContainer>
              <AreaChart data={data}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
                <XAxis dataKey="timestamp" tickFormatter={s=>s?s.slice(5,10):''} stroke="#475569" tick={{fontSize:9,fontFamily:'JetBrains Mono'}} />
                <YAxis stroke="#475569" tick={{fontSize:9,fontFamily:'JetBrains Mono'}} />
                <Area type="monotone" dataKey="balance" stroke="#22c55e" fill="rgba(34,197,94,.08)" strokeWidth={1.5} dot={false} />
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div className="card">
          <div className="card-title">Unrealized P&L</div>
          <div className="chart-wrap-sm">
            <ResponsiveContainer>
              <BarChart data={data}>
                <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
                <XAxis dataKey="timestamp" tickFormatter={s=>s?s.slice(5,10):''} stroke="#475569" tick={{fontSize:9,fontFamily:'JetBrains Mono'}} />
                <YAxis stroke="#475569" tick={{fontSize:9,fontFamily:'JetBrains Mono'}} />
                <Bar dataKey="unrealized_pnl" name="Unrealized">
                  {data.map((d,i) => <Cell key={i} fill={d.unrealized_pnl >= 0 ? '#22c55e' : '#ef4444'} opacity={0.7} />)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════ Trades Page ═══════════════════

function TradesPage() {
  const [trades, setTrades] = useState([]);
  const [strategies, setStrategies] = useState([]);
  const [fSid, setFSid] = useState('');
  const [fReason, setFReason] = useState('');
  const [fDays, setFDays] = useState(90);
  
  useEffect(() => { API.overview().then(r => setStrategies(r.strategies)); }, []);
  useEffect(() => {
    const p = new URLSearchParams();
    p.set('days', fDays);
    if (fSid) p.set('strategy_id', fSid);
    if (fReason) p.set('exit_reason', fReason);
    API.trades(p.toString()).then(r => setTrades(r.trades || []));
  }, [fSid, fReason, fDays]);
  
  return (
    <div>
      <div className="filters">
        <select value={fSid} onChange={e=>setFSid(e.target.value)}>
          <option value="">All Strategies</option>
          {strategies.map(s=><option key={s.strategy_id} value={s.strategy_id}>{sn(s.strategy_id)}</option>)}
        </select>
        <select value={fReason} onChange={e=>setFReason(e.target.value)}>
          <option value="">All Reasons</option>
          <option value="익절">TP</option><option value="손절">SL</option>
          <option value="트레일링">Trailing</option><option value="시간">Time</option>
          <option value="시그널">Signal</option><option value="강제청산">Liquidation</option>
        </select>

// ═══════════════════ Calendar Page ═══════════════════

function CalendarPage() {
  const [data, setData] = useState([]);
  const [sid, setSid] = useState('');
  const [strategies, setStrategies] = useState([]);
  
  useEffect(() => { API.overview().then(r => setStrategies(r.strategies)); }, []);
  useEffect(() => { API.calendar(sid||null, 90).then(r => setData(r.data || [])); }, [sid]);
  
  const pnlMap = useMemo(() => {
    const m = {};
    data.forEach(d => { m[d.date] = d; });
    return m;
  }, [data]);
  
  // Build calendar grid for last 12 weeks
  const weeks = useMemo(() => {
    const today = new Date();
    const start = new Date(today);
    start.setDate(start.getDate() - 83); // ~12 weeks
    start.setDate(start.getDate() - start.getDay()); // align to Sunday
    
    const cells = [];
    const cur = new Date(start);
    while (cur <= today) {
      const key = cur.toISOString().slice(0,10);
      cells.push({ date: key, day: cur.getDate(), data: pnlMap[key] || null });
      cur.setDate(cur.getDate() + 1);
    }
    return cells;
  }, [pnlMap]);
  
  const maxAbs = useMemo(() => Math.max(1, ...data.map(d => Math.abs(d.pnl || 0))), [data]);
  
  const cellColor = (d) => {
    if (!d) return 'var(--bg-1)';
    const intensity = Math.min(Math.abs(d.pnl) / maxAbs, 1);
    const alpha = 0.15 + intensity * 0.6;
    return d.pnl >= 0 ? `rgba(34,197,94,${alpha})` : `rgba(239,68,68,${alpha})`;
  };
  
  const totalPnl = data.reduce((s,d) => s + (d.pnl||0), 0);
  const winDays = data.filter(d => d.pnl > 0).length;
  const lossDays = data.filter(d => d.pnl < 0).length;
  
  return (
    <div>
      <div className="filters">
        <select value={sid} onChange={e=>setSid(e.target.value)}>
          <option value="">All Strategies</option>
          {strategies.map(s=><option key={s.strategy_id} value={s.strategy_id}>{sn(s.strategy_id)}</option>)}
        </select>
      </div>
      
      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(4,1fr)',marginBottom:20}}>
        <div className="kpi">
          <div className="kpi-label">Period P&L</div>
          <div className={`kpi-value ${cn(totalPnl)}`}>{$(totalPnl)}</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Trading Days</div>
          <div className="kpi-value">{data.length}</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Win Days</div>
          <div className="kpi-value pos">{winDays}</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Loss Days</div>
          <div className="kpi-value neg">{lossDays}</div>
        </div>
      </div>
      
      <div className="card" style={{marginBottom:20}}>
        <div className="card-title">P&L Calendar — Last 12 Weeks</div>
        <div className="cal-grid">
          {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => <div key={d} className="cal-header">{d}</div>)}
          {weeks.map((c,i) => (
            <div key={i} className="cal-cell" style={{background:cellColor(c.data)}} title={c.data ? `${c.date}: ${$(c.data.pnl)} (${c.data.trades} trades)` : c.date}>
              <div className="day">{c.day}</div>
              {c.data && <div className={cn(c.data.pnl)} style={{fontSize:'.6rem',fontFamily:'var(--font-mono)'}}>{c.data.pnl >= 0 ? '+' : ''}{c.data.pnl.toFixed(0)}</div>}
            </div>
          ))}
        </div>
      </div>
      
      <div className="card">
        <div className="card-title">Daily P&L Distribution</div>
        <div className="chart-wrap-sm">
          <ResponsiveContainer>
            <BarChart data={data}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
              <XAxis dataKey="date" tickFormatter={s=>s?s.slice(5):''} stroke="#475569" tick={{fontSize:9,fontFamily:'JetBrains Mono'}} />
              <YAxis stroke="#475569" tick={{fontSize:9,fontFamily:'JetBrains Mono'}} tickFormatter={v=>`$${v.toFixed(0)}`} />
              <Tooltip contentStyle={{background:'#1a2235',border:'1px solid #334155',borderRadius:6,fontFamily:'JetBrains Mono',fontSize:11}} />
              <Bar dataKey="pnl" name="Daily P&L">
                {data.map((d,i) => <Cell key={i} fill={d.pnl >= 0 ? '#22c55e' : '#ef4444'} opacity={0.8} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </div>
  );
}

  calendar: <svg className="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,

// ═══════════════════ App Shell ═══════════════════

const PAGES = [
  {id:'overview', label:'Overview', icon:icons.overview, comp:OverviewPage},
  {id:'market', label:'Market', icon:icons.market, comp:MarketPage},
  {id:'equity', label:'Equity Curve', icon:icons.equity, comp:EquityPage},
  {id:'trades', label:'Trade Log', icon:icons.trades, comp:TradesPage},
  {id:'calendar', label:'P&L Calendar', icon:icons.calendar, comp:CalendarPage},
  {id:'compare', label:'Strategies', icon:icons.compare, comp:ComparePage},
  {id:'risk', label:'Risk Monitor', icon:icons.risk, comp:RiskPage},
  {id:'feed', label:'Activity Feed', icon:icons.feed, comp:FeedPage},
];

function App() {
  const [auth, setAuth] = useState(!!API.token);
  const [page, setPage] = useState('overview');
  const [clock, setClock] = useState('');
  
  useEffect(() => {
    const t = setInterval(() => {
      setClock(new Date().toISOString().slice(0,19).replace('T',' ') + ' UTC');
    }, 1000);
    return () => clearInterval(t);
  }, []);
  
  if (!auth) return <LoginPage onLogin={() => setAuth(true)} />;
  
  const PageComp = PAGES.find(p => p.id === page)?.comp || OverviewPage;
  
  return (
    <div className="shell">
      <div className="topbar">
        <div className="topbar-brand" style={{cursor:'pointer'}} onClick={()=>setPage('overview')}><span>P</span>hantom Trader</div>
        <div className="topbar-right">
          <span><span className="topbar-dot"/>LIVE</span>
          <span>{clock}</span>
        </div>
      </div>
      <div className="sidebar">
        <div className="nav-label">Analytics</div>
        {PAGES.map(p => (
          <div key={p.id} className={`nav-item ${page===p.id?'active':''}`} onClick={()=>setPage(p.id)}>
            {p.icon}<span>{p.label}</span>
          </div>
        ))}
      </div>
      <div className="main">
        <PageComp />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
